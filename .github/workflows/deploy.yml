name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npx expo export --platform web

      - name: Show built index.html (debug)
        run: cat dist/index.html

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          # If Expo generated absolute paths like /_expo/, prefix with /gymmate/
          sed -i 's|"/_expo/|"/gymmate/_expo/|g' dist/index.html
          sed -i 's|src="/_expo/|src="/gymmate/_expo/|g' dist/index.html

          # Inject @font-face for Ionicons so tab bar icons render on web
          IONICONS_FILE=$(find dist/assets -name "Ionicons.*.ttf" | head -1 | sed 's|dist/||')
          FONT_CSS="<style>@font-face{font-family:'Ionicons';src:url('/gymmate/${IONICONS_FILE}') format('truetype');font-weight:normal;font-style:normal;}</style>"
          sed -i "s|</head>|${FONT_CSS}</head>|" dist/index.html

          # Copy to 404.html for SPA routing (back button, direct links)
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
